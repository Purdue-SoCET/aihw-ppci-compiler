name: compiler_validation

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  compiler_validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . numpy pydot

      - name: Run test_validation
        run: python test_validation/run_all_validation.py

      - name: Run test_validation_kernals
        run: python test_validation_kernals/run_kernel_validation.py

      - name: Upload validation artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compiler_validation_artifacts
          path: |
            test_validation/out
            test_validation_kernals/out
